version: "3.8"

services:
  # Disable the api service in this override, as we'll run it locally
  api:
    profiles:
      - donotstart

  # Disable the db migrator that's only meant for prod
  migrator:
    profiles:
      - donotstart

  # Add the development-only volume mount for live code reloading
  ml-service:
    volumes:
      - ./ml-service:/yolov5-snap-go
    restart: "no"

  # The db service inherits its configuration from the base compose.yaml
  # so we don't need to add anything for it here.
  db:
    restart: "no"

  # Separate DB service for development
  db-dev:
    image: mysql:8.0
    container_name: snapandgo_db_dev
    env_file: api/.env.dev
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: "no"
    volumes:
      - mysql_snapandgo_dev_data:/var/lib/mysql
    networks:
      - app-network

networks:
  app-network: {}

volumes:
  mysql_snapandgo_dev_data:
